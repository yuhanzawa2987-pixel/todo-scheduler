    body { font-family: sans-serif; margin:0; padding: 0; max-width: 500px; }
    .task { margin-left: 5px;padding: 5px; border-radius: 5px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); display:flex; align-items: center;}
    .tasktitle{ padding: 0px 5px 5px 5px;font-size: 15px; flex:1; white-space:nowrap; overflow:hidden; text-overflow: ellipsis; max-width: 250px;font-weight: bold;}
    .tasktitleminute{ font-size: 10px; font-weight: bold;}
    .right { display: flex; gap: 8px;margin-left: auto; align-items: center;}
    .taskbtn{ font-size: 15px; color: #fff; margin-left: 5px; padding:5px 8px; border-radius: 5px; background-color: #ff3f3f;cursor: pointer;}
    .deleteTaskbtn{ font-weight: bold; font-size: 15px; color: #fff; margin-left: 5px; padding:5px 8px; border-radius: 5px; background-color: #ff3f3f;cursor: pointer;}
    .handlebtn{ font-size: 20px;  margin-left: 5px; padding:8px 12px; border-radius: 5px; cursor: pointer; margin-left: auto;font-weight: bold;}
    .doing { border-left:20px solid #ff3f3f;}
    .done { background-color: #ddd;}
    .donetitle {  text-decoration: line-through; }
    .donebtn { font-size: 15px; color: #fff; margin-left: 5px; padding:5px 8px; border-radius: 5px; background-color: #ccc;cursor: pointer;}
    button { margin-left: 1px; padding: 5px 5px;}
    input { font-size: 16px;}
    #inputArea { 
      position: fixed; 
      top: 0px;
      left: 0;
      right: 0;
      background: white;
      padding: 10px;
      padding-bottom: 60px;
      border-bottom: 1px solid #ccc;
      height: 40px;
      text-align: center;
      opacity: 0.9;
     }
  </style>

</script>

<div id="inputArea">
  <h2 style="margin:0px 0px 10px 0px;padding:10px; color:white;background-color: #ff3f3f;">今日のタスク</h2>
  <input type="text" id="newTitle" placeholder="タスク名">
  <input type="number" id="newMinutes" placeholder="分" min="1" style="width: 50px;">
  <span id="addTask" class="taskbtn">追加</span>

<div id="taskList" style=" padding-top: 100px;"></div>




<script>
  new Sortable(document.getElementById("taskList"), {
    animation: 150,
    handle: ".handle"
  });

let tasks = [];
const taskList = document.getElementById("taskList");
const addBtn = document.getElementById("addTask");

addBtn.addEventListener("click", () => {
  const title = document.getElementById("newTitle").value;
  const minutes = parseInt(document.getElementById("newMinutes").value);

  if(!title || !minutes) return;

  createTask({id: crypto.randomUUID(), title, minutes, done:false});
  
 new Audio("sounds/alarm_add.mp3").play();
});


//タスク作成
function createTask(task, save = true) {
  
  if(save){
    tasks.push(task);
    saveTasks();
  }

  const taskDiv = document.createElement("div");
  taskDiv.className = "task";
  taskDiv.dataset.id = task.id;
  taskDiv.setAttribute("draggable", "true");

  const duration = task.minutes * 60;
  let remaining = duration;
  let timer = null;

  taskDiv.innerHTML = `
    <input type="checkbox">
    <span class="tasktitle">${formatTitle(task.title)}</span>
    <div class="right">
    <span class="tasktitleminute">（${task.minutes}分）</span>
    <span class="deleteTaskbtn">×</span>
    <span class="taskbtn">▶0:00</span>
    <span class="handle handlebtn">☰</span>
    </div>
  `;

  const checkbox = taskDiv.querySelector("input");
  //const startBtn = taskDiv.querySelectorAll("button")[0];
  //const completeBtn = taskDiv.querySelectorAll("button")[1];
  const taskTitle = taskDiv.querySelectorAll("span")[0];
  const taskTitleminute = taskDiv.querySelectorAll("span")[1];
  const deleteBtn = taskDiv.querySelectorAll("span")[2];
  const timerSpan = taskDiv.querySelectorAll("span")[3];

  //doneの表示処理
  function updateDoneDisplay( ){
    if(task.done){
      taskDiv.classList.add("done");
      taskTitle.classList.add("donetitle");
      taskTitleminute.classList.add("donetitle");
      deleteBtn.classList.add("donebtn");
      timerSpan.classList.add("donebtn");
    } else {
      taskDiv.classList.remove("done");
      taskTitle.classList.remove("donetitle");
      taskTitleminute.classList.remove("donetitle");
      deleteBtn.classList.remove("donebtn");
      timerSpan.classList.remove("donebtn");
    }
  }
  //チェックボックス読み込み処理
  checkbox.checked = task.done;
  updateDoneDisplay();

  // 削除ボタン処理
  deleteBtn.addEventListener("click", () => {
    taskDiv.remove();
    const index = tasks.indexOf(task);

    if (index !== -1) {
      tasks.splice(index, 1);
    }
    saveTasks();
    new Audio("sounds/alarm_reset.mp3").play();
  });

  //時間表示処理
  function updateDisplay() {
    const min = Math.floor(remaining / 60);
    const sec = remaining % 60;
    timerSpan.textContent = `${min}:${sec.toString().padStart(2,"0")}`;
  }

  //開始ボタン処理
  timerSpan.addEventListener("click", () => {
    
    const min = Math.floor(remaining / 60);
    const sec = remaining % 60;

    if(task.done) {
      return;
    }

    if(timer) {
      clearInterval(timer);
      timer = null;
      updateDisplay();
      timerSpan.textContent = "▶" + timerSpan.textContent;
      taskDiv.classList.remove("doing");
      return;
    }

    taskDiv.classList.add("doing");
      updateDisplay();
      timerSpan.textContent = "▶" + timerSpan.textContent;

    timer = setInterval(() => {
      if(remaining <= 0) {
        clearInterval(timer);
        timer = null;
        taskDiv.classList.remove("doing");
        //taskDiv.classList.add("done");
        //checkbox.checked = true;
        remaining = task.minutes * 60;
        updateDisplay();
        timerSpan.textContent = "▶" + timerSpan.textContent;
        new Audio("sounds/alarm_timer.mp3").play();
        const now = new Date();
        alert(now + "に" + task.title + " のタイマーが終了しました！");
        // if(Notification.permission === "granted"){
        //   new Notification("タイマー終了", {
        //   body: task.title + " のタイマーが終了しました！"
        //   });
        // }
        return;
      }
      remaining--;
      updateDisplay();
      timerSpan.textContent = "■" + timerSpan.textContent;
    }, 1000);
  });

  //完了ボタン処理
  /*
  completeBtn.addEventListener("click", () => {
    clearInterval(timer);
    timer = null;
    remaining = 0;
    taskDiv.classList.remove("doing");
    taskDiv.classList.add("done");
    checkbox.checked = true;
    task.done = true;
    saveTasks();
    timerSpan.textContent = "▶" + remaining;
    updateDisplay();
    new Audio("sounds/alarm_done.mp3").play();
  });
*/



  //チェックボックス処理
  checkbox.addEventListener("change", () => {
    task.done = checkbox.checked;
    updateDoneDisplay();
    if(task.done){
      clearInterval(timer);
      timer = null;
      remaining = 0;
      new Audio("sounds/alarm_done.mp3").play();
    } else {
      remaining = task.minutes * 60;
      new Audio("sounds/alarm_canceled.mp3").play();
    }
    updateDisplay();
    timerSpan.textContent = "▶" + timerSpan.textContent;
    saveTasks();   // ← 超重要
  });

  //ドラッグ処理
  taskDiv.addEventListener("dragstart", () => {
    taskDiv.classList.add("dragging");
  });
  taskDiv.addEventListener("dragend", () => {
    taskDiv.classList.remove("dragging");
    updateTaskOrder();
  });
  taskList.addEventListener("dragover", e => {
    e.preventDefault();
    const dragging = document.querySelector(".dragging");
    const afterElement = getDragAfterElement(taskList, e.clientY);
    if(afterElement == null){
      taskList.appendChild(dragging);
    } else {
      taskList.insertBefore(dragging, afterElement);
    }
  });

  updateDisplay();
  timerSpan.textContent = "▶" + timerSpan.textContent;
  taskList.appendChild(taskDiv);
}

//ドラッグ時のエレメント取得
function getDragAfterElement(container, y){
  const elements =[...container.querySelectorAll(".task:not(.dragging)")];
  return elements.reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;
    if(offset < 0 && offset > closest.offset){
      return { offset: offset, element: child };
    } else{
      return closest;
    }
  }, { offset: Number.NEGATIVE_INFINITY }).element;
}

//並び替え時DOMの順番をtasks配列に反映
function updateTaskOrder(){
  const newOrder = [];
  const taskDivs = document.querySelectorAll(".task");

  taskDivs.forEach(div => {
    const id = div.dataset.id;
    const task = tasks.find(t => t.id === id);
    if(task) newOrder.push(task);
  });
  tasks = newOrder;
  saveTasks();
}

//保存関数
function saveTasks(){
//  updateTotalTime();
//  updateRealTotalTime();
  localStorage.setItem("myTasks", JSON.stringify(tasks));
}

//時間の色を変える関数
function formatTitle(title){
  const match = title.match(/^(\d{1,2}:\d{2})\s*(.*)/);
  if(match){
    return `<strong>${match[1]}</strong> ${match[2]}`;
  }
  return title;
}

//ページ読み込み時に復元（一番下に書くように）
window.addEventListener("DOMContentLoaded", () => {
  const saved = localStorage.getItem("myTasks");
  if(saved){
    tasks.length = 0;
    tasks.push(...JSON.parse(saved));
    tasks.forEach(task => {
      createTask(task, false);
    });
  }
  //ページ読み込み時に通知許可
  if("Notification" in window) {
    Notification.requestPermission();
  }
});
